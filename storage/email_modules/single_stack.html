<table width="100%" cellpadding="0" cellspacing="0" role="presentation" class="module-wrapper">
  {% if image_url %}
  <tr>
    <td>
      <img src="{{ image_url }}" alt="{{ image_alt }}" class="module-image" />
    </td>
  </tr>
  {% endif %}
  <tr>
    <td class="module-content-cell">
      <h2 class="module-headline">{{ headline_medium }}</h2>
      {% if body_medium %}<p class="module-body">{{ body_medium }}</p>{% endif %}
      {% if button_label and button_url %}
      <a href="{{ button_url }}" class="module-button">{{ button_label }}</a>
      {% endif %}
    </td>
  </tr>
</table>
