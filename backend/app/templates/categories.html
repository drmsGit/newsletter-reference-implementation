{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">Categories</h1>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Parent</th>
        </tr>
    </thead>

    <tbody>
        {% for category in categories %}
        <tr>
            <td>{{ category.id }}</td>
            <td>
                <a href="/ui/categories/{{ category.id }}">
                    {{ category.name }}
                </a>
            </td>
            <td>{{ category.type }}</td>
            <td>{{ category.parent_category_id }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
