{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">Content</h1>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for record in records %}
        <tr>
            <td>{{ record.id }}</td>
            <td>
                <a href="/ui/content/{{ record.id }}">
                    {{ record.title }}
                </a>
            </td>
            <td>{{ record.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
