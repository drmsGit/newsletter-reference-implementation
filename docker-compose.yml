services:
  postgres:
    image: postgres:16
    container_name: newsletter_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: newsletter
      POSTGRES_USER: newsletter_user
      POSTGRES_PASSWORD: newsletter_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: